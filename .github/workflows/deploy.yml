name: .NET EC2 Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2️⃣ Setup .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.0.x

      # 3️⃣ Publish the app
      - name: Publish App
        run: dotnet publish -c Release -o publish

      # 4️⃣ Verify publish output (optional)
      - name: Verify Publish Output
        run: ls -R publish

      # 5️⃣ Copy wwwroot contents to a temporary folder (flatten)
      - name: Flatten wwwroot
        run: |
          rm -rf deploy-temp
          mkdir deploy-temp
          cp -r publish/wwwroot/* deploy-temp/

      # 6️⃣ Upload to EC2
      - name: Copy Files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "deploy-temp/*"
          target: "/home/ubuntu/deploy-temp"

      # 7️⃣ Deploy on EC2
      - name: Deploy to Nginx
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # Remove old files
            sudo rm -rf /var/www/html/*

            # Move new files from temp
            sudo mv /home/ubuntu/deploy-temp/* /var/www/html/

            # Remove temp folder
            sudo rm -rf /home/ubuntu/deploy-temp

            # Set correct permissions
            sudo chown -R www-data:www-data /var/www/html
            sudo chmod -R 755 /var/www/html

            # Restart Nginx
            sudo systemctl restart nginx