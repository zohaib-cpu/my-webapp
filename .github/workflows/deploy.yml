name: .NET WebApp CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup .NET SDK
      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.0.x

      # 3️⃣ Restore & Build
      - name: Restore & Build
        run: |
          dotnet restore
          dotnet build --configuration Release

      # 4️⃣ Publish
      - name: Publish
        run: dotnet publish -c Release -o publish

      # 5️⃣ Copy files to EC2 deploy folder
      - name: SCP to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          source: "publish/wwwroot/*"
          target: "/home/ubuntu/deploy"

      # 6️⃣ Run deploy script on EC2
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "✅ Starting deployment..."

            # Clean old HTML
            sudo rm -rf /var/www/html/*

            # Copy published files to Nginx root
            sudo cp -r /home/ubuntu/deploy/* /var/www/html/

            # Set ownership & permissions
            sudo chown -R www-data:www-data /var/www/html
            sudo chmod -R 755 /var/www/html

            # Reload Nginx
            sudo systemctl reload nginx

            # Clean deploy folder
            sudo rm -rf /home/ubuntu/deploy

            echo "✅ Deployment finished!"
