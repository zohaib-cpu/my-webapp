name: .NET EC2 Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Code checkout
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2️⃣ Setup .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.0.x

      # 3️⃣ Publish App
      - name: Publish App
        run: dotnet publish -c Release -o publish

      # 4️⃣ Verify publish output
      - name: Verify Publish Output
        run: ls -R publish

      # 5️⃣ Copy wwwroot content to temporary folder
      - name: Prepare deploy folder
        run: |
          mkdir -p deploy-temp
          cp -r publish/wwwroot/* deploy-temp/

      # 6️⃣ Copy files to EC2
      - name: Copy Files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "deploy-temp/*"
          target: "/home/ubuntu/deploy-temp"

      # 7️⃣ Deploy to /var/www/html and fix permissions
      - name: Deploy to Nginx
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # Clear current html folder
            sudo rm -rf /var/www/html/*

            # Move files from temporary folder to /var/www/html
            sudo mv /home/ubuntu/deploy-temp/* /var/www/html/

            # Set permissions for Nginx
            sudo chown -R www-data:www-data /var/www/html
            sudo chmod -R 755 /var/www/html

            # Remove temp folder
            sudo rm -rf /home/ubuntu/deploy-temp

            # Restart Nginx
            sudo systemctl restart nginx