name: .NET EC2 Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      
      - name: Checkout Code
        uses: actions/checkout@v3

     
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.0.x

     
      - name: Publish App
        run: dotnet publish -c Release -o publish

     
      - name: Verify Publish Output
        run: ls -R publish/wwwroot

      
      - name: Deploy to EC2 via rsync
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
           
            mkdir -p /home/ubuntu/deploy-temp

            
            rsync -av --delete publish/wwwroot/ /home/ubuntu/deploy-temp/

            
            sudo rm -rf /var/www/html/*

            
            sudo mv /home/ubuntu/deploy-temp/* /var/www/html/

           
            sudo rm -rf /home/ubuntu/deploy-temp

           
            sudo chown -R www-data:www-data /var/www/html
            sudo chmod -R 755 /var/www/html

            
            sudo systemctl restart nginx