name: .NET EC2 Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.0.x

      - name: Publish App
        run: dotnet publish -c Release -o publish

      # Flatten publish and wwwroot contents
      - name: Flatten Publish Folder
        run: |
          rm -rf deploy-temp
          mkdir deploy-temp
          # Copy dll, exe, pdb, web.config, etc.
          cp -r publish/* deploy-temp/
          # Copy wwwroot contents directly (flatten)
          cp -r publish/wwwroot/* deploy-temp/

      - name: Copy Files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "deploy-temp/*"
          target: "/home/ubuntu/deploy-temp"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            sudo rm -rf /var/www/html/*
            sudo mv /home/ubuntu/deploy-temp/* /var/www/html/
            sudo chown -R www-data:www-data /var/www/html
            sudo chmod -R 755 /var/www/html
            sudo systemctl daemon-reload
            sudo systemctl restart mywebapp.service
            sudo systemctl restart nginx