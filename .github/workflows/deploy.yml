name: .NET EC2 Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2️⃣ Setup .NET SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.0.x

      # 3️⃣ Publish .NET app
      - name: Publish App
        run: dotnet publish -c Release -o publish

      # 4️⃣ Flatten publish folder (remove extra inner folder)
      - name: Flatten Publish Folder
        run: |
          rm -rf deploy-temp
          mkdir deploy-temp
          cp -r publish/* deploy-temp/

      # 5️⃣ Copy files to EC2
      - name: Copy Files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "deploy-temp/*"
          target: "/home/ubuntu/deploy-temp"

      # 6️⃣ Deploy to EC2 (move to /var/www/html, set permissions, restart services)
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # Clear old files
            sudo rm -rf /var/www/html/*

            # Move new files from temp folder
            sudo mv /home/ubuntu/deploy-temp/* /var/www/html/

            # Set correct ownership and permissions
            sudo chown -R www-data:www-data /var/www/html
            sudo chmod -R 755 /var/www/html

            # Reload systemd and restart service
            sudo systemctl daemon-reload
            sudo systemctl restart mywebapp.service

            # Restart Nginx
            sudo systemctl restart nginx